  <div
    style="
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    "
  >
    <mat-card class="login-card">
      <h2 class="login-title">{{ 'LOGIN' | translate }}</h2>

      <label class="label-form">{{ 'USERNAME' | translate }}</label>
      <div class="custom-input">
        <input
          matInput
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          (input)="errorMessage.set('')"
          [placeholder]="'USERNAME-PLACEHOLDER' | translate"
          (keyup.enter)="login()"
        />
      </div>

      <label class="label-form">{{ 'PASSWORD' | translate }}</label>
      <div class="custom-input">
        <input
          matInput
          [type]="hide ? 'text' : 'password'"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (input)="errorMessage.set('')"
          [placeholder]="'PASSWORD-PLACEHOLDER' | translate"
          #passwordInput
          (keyup.enter)="login()"
        />
        <button
          mat-icon-button
          matSuffix
          (click)="toggleVisibility()"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hide"
        >
          <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        <mat-icon style="vertical-align: middle; font-size: 18px; height: 18px; width: 18px">
          error_outline
        </mat-icon>
        <span style="margin-left: 8px">{{ errorMessage() }}</span>
      </div>

      <button
        color="primary"
        class="full-width login-button"
        (click)="login()"
        [disabled]="isLoading()"
      >
        <span *ngIf="!isLoading()">{{ 'LOGIN' | translate }}</span>

        <div *ngIf="isLoading()" class="loading-wrapper">
          <mat-spinner diameter="20" mode="indeterminate" class="inline-spinner"></mat-spinner>
          <span>{{ 'LOGGING-IN' | translate }}</span>
        </div>
      </button>
    </mat-card>
