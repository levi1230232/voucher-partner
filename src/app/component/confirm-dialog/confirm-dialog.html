<h2 mat-dialog-title>Confirm Action</h2>

<mat-dialog-content>
  {{ data.title }}
  <span style="font-weight: 600">{{ data.name }} ?</span>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="warn" (click)="close()">No</button>
  <button mat-raised-button color="primary" (click)="confirm()">Yes</button>
</mat-dialog-actions>
