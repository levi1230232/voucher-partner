<h2 mat-dialog-title>Confirm Action</h2>

<mat-dialog-content>
  {{ data.title }}
  <span style="font-weight: 600">"{{ data.name }}" ?</span>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="btn-outline" (click)="close()">{{ 'NO' | translate }}</button>
  <button class="btn-premium" (click)="confirm()">{{ 'YES' | translate }}</button>
</mat-dialog-actions>
